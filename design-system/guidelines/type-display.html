<!-- @dsCard group="Type" viewport="700x230" name="Display serif" subtitle="Cormorant Garamond — the LFA voice, often italic" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--lfa-white);padding:22px 24px;color:var(--lfa-navy)}
  .display{font:italic var(--fw-serif-med) 52px/1.05 var(--font-serif);letter-spacing:-.01em;margin:0}
  .h1{font:var(--fw-serif-med) 34px/1.15 var(--font-serif);margin:14px 0 0}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--lfa-grey);letter-spacing:.1em;text-transform:uppercase;margin-top:16px}
</style></head>
<body>
  <p class="display">Your Swiss Guide to Diversification</p>
  <p class="h1">What Makes LFA Different?</p>
  <div class="meta">Cormorant Garamond · italic 500 / roman 500 · -1% tracking</div>
</body></html>
