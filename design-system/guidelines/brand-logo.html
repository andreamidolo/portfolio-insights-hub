<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--lfa-white);padding:24px;display:flex;gap:30px;align-items:center}
  .pane{display:flex;align-items:center;justify-content:center;border:1px solid var(--lfa-line);border-radius:var(--radius-md);padding:22px 30px;flex:1}
  .pane.dark{background:var(--lfa-navy);border-color:var(--lfa-navy)}
  img{height:120px;display:block}
  .note{font-family:var(--font-sans);font-size:12px;color:var(--lfa-grey);max-width:180px;line-height:1.5}
</style></head>
<body>
  <div class="pane"><img src="../assets/logo-lfa-full.png" alt="LFA logo"></div>
  <p class="note">Primary lockup: red Swiss cross + three navy stars, wordmark <b style="color:var(--lfa-navy)">LFA</b>, and the letterspaced tagline <i>Swiss Wealth Management for US Clients</i>. Keep clear space; never recolor the cross.</p>
</body></html>
