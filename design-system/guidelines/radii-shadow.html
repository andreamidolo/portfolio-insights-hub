<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & shadow" subtitle="Subtle radii, soft navy-tinted shadows" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--lfa-paper);padding:24px;font-family:var(--font-sans)}
  .row{display:flex;gap:22px;flex-wrap:wrap}
  .box{width:96px;height:64px;background:var(--lfa-white);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--lfa-navy);font-weight:700;border:1px solid var(--lfa-line)}
  .cap{font-size:10px;color:var(--lfa-grey);margin-top:6px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)">xs</div><div class="cap">3px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)">sm</div><div class="cap">6px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)">md</div><div class="cap">10px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:64px">pill</div><div class="cap">999px</div></div>
    <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-sm);border-radius:var(--radius-md)">sm</div><div class="cap">shadow-sm</div></div>
    <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-md);border-radius:var(--radius-md)">md</div><div class="cap">shadow-md</div></div>
    <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-lg);border-radius:var(--radius-md)">lg</div><div class="cap">shadow-lg</div></div>
  </div>
</body></html>
