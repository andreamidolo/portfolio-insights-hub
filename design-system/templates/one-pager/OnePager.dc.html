<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="LFA One-Pager" description="A4 portrait one-pager: logo header, italic-serif headline, differentiators, stats band, offices footer." -->
<helmet>
<script src="./ds-base.js"></script>
<style>
  @page { size: A4 portrait; margin: 0; }
  body { margin: 0; background: #e9ebef; }
</style>
</helmet>

<div style="width: 794px; min-height: 1123px; margin: 24px auto; background: #fff; box-shadow: 0 18px 48px rgba(26,42,85,0.14); display: flex; flex-direction: column; font-family: var(--font-sans); color: var(--lfa-navy-500);">

  <!-- Header -->
  <div style="display: flex; align-items: center; justify-content: space-between; padding: 40px 56px 0;">
    <img src="../../assets/logo-lfa-full.png" alt="LFA" style="height: 64px; display: block;" />
    <div style="text-align: right; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--lfa-navy-300); line-height: 1.7;">
      Swiss Wealth Management<br />for U.S. Clients
    </div>
  </div>

  <!-- Hero -->
  <div style="padding: 44px 56px 0;">
    <div style="font-family: var(--font-sans); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--lfa-rose);">{{ eyebrow }}</div>
    <h1 style="margin: 16px 0 0; font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 44px; line-height: 1.1; letter-spacing: -0.01em; color: var(--lfa-navy);">{{ headline }}</h1>
    <p style="margin: 22px 0 0; font-size: 16px; line-height: 1.62; color: var(--lfa-navy-500); max-width: 60ch;">{{ lead }}</p>
  </div>

  <!-- Differentiators -->
  <div style="padding: 48px 56px 0; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px;">
    <sc-for list="{{ features }}" as="f" hint-placeholder-count="3">
      <div>
        <div style="height: 2px; width: 36px; background: var(--lfa-rose); margin-bottom: 16px;"></div>
        <div style="font-family: var(--font-sans); font-weight: 700; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lfa-navy); margin-bottom: 8px; line-height: 1.4;">{{ f.title }}</div>
        <div style="font-size: 14px; line-height: 1.6; color: var(--lfa-navy-500);">{{ f.body }}</div>
      </div>
    </sc-for>
  </div>

  <!-- Stats band -->
  <div style="margin: 52px 56px 0; background: var(--lfa-paper); border-top: 1px solid var(--lfa-line); border-bottom: 1px solid var(--lfa-line); padding: 32px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;">
    <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
      <div>
        <div style="font-family: var(--font-serif); font-weight: 600; font-size: 40px; line-height: 1; letter-spacing: -0.01em; color: var(--lfa-navy);">{{ s.value }}</div>
        <div style="margin-top: 8px; font-family: var(--font-sans); font-weight: 700; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--lfa-navy-500); line-height: 1.4;">{{ s.label }}</div>
      </div>
    </sc-for>
  </div>

  <div style="flex: 1;"></div>

  <!-- Footer -->
  <div style="background: var(--lfa-navy-deep); color: rgba(255,255,255,0.78); padding: 28px 56px; display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;">
    <div style="display: flex; gap: 40px;">
      <div>
        <div style="font-weight: 700; font-size: 11px; letter-spacing: 0.14em; color: #fff; margin-bottom: 8px;">ZURICH</div>
        <div style="font-size: 12px; line-height: 1.6;">Talstrasse 65<br />8001 Zurich</div>
      </div>
      <div>
        <div style="font-weight: 700; font-size: 11px; letter-spacing: 0.14em; color: #fff; margin-bottom: 8px;">LUGANO</div>
        <div style="font-size: 12px; line-height: 1.6;">Via F. Pelli 3<br />6900 Lugano</div>
      </div>
      <div>
        <div style="font-weight: 700; font-size: 11px; letter-spacing: 0.14em; color: #fff; margin-bottom: 8px;">SION</div>
        <div style="font-size: 12px; line-height: 1.6;">25 Rue de Lausanne<br />1950 Sion</div>
      </div>
    </div>
    <div style="text-align: right; font-size: 12px; line-height: 1.7; color: rgba(255,255,255,0.7);">info@lfa.ch<br />www.lfa.ch</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 842, &quot;height&quot;: 1171}, &quot;eyebrow&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Swiss Wealth Management&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;headline&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Your Swiss Guide to International Diversification&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;lead&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;LFA is a fee-based Swiss wealth management firm serving U.S. investors.&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      eyebrow: this.props.eyebrow ?? 'Swiss Wealth Management',
      headline: this.props.headline ?? 'Your Swiss Guide to International Diversification',
      lead: this.props.lead ?? 'LFA is a fee-based Swiss wealth management firm serving U.S. investors who want to expand part of their portfolio beyond U.S. markets and currency — with custom strategies, global diversification, and tax-aware planning.',
      features: this.props.features ?? [
        { title: 'SEC Registered', body: 'Authorized to provide advisory services to U.S. clients, in the U.S. or abroad.' },
        { title: 'FINMA Regulated', body: 'A regulated Swiss asset manager, part of LFG Holding.' },
        { title: 'Independent & Fee-Based', body: 'Open-architecture advice, free from product or third-party influence.' },
      ],
      stats: this.props.stats ?? [
        { value: '2.5bn', label: 'USD assets under management' },
        { value: '700', label: 'Clients served' },
        { value: '50+', label: 'Investment professionals' },
        { value: '2009', label: 'Founded in Lugano' },
      ],
    };
  }
}
</script>
</body>
</html>
