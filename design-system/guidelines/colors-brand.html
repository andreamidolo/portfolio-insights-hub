<!-- @dsCard group="Colors" viewport="700x150" name="Brand core" subtitle="Navy backbone, Swiss red, working rose accent" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--lfa-white);padding:18px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1 1 0;min-width:120px}
  .chip{height:74px;border-radius:var(--radius-sm);border:1px solid var(--lfa-line);display:flex;align-items:flex-end;padding:8px;box-shadow:var(--shadow-xs)}
  .name{font-size:12px;font-weight:700;color:var(--lfa-navy);margin-top:8px;letter-spacing:.02em}
  .hex{font-size:11px;color:var(--lfa-grey);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lfa-navy)"></div><div class="name">Navy</div><div class="hex">#23366E</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-navy-deep)"></div><div class="name">Navy Deep</div><div class="hex">#1A2A55</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-red)"></div><div class="name">Swiss Red</div><div class="hex">#C31F3A</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-rose)"></div><div class="name">Rose (accent)</div><div class="hex">#C24A5E</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-rose-section)"></div><div class="name">Rose Section</div><div class="hex">#C55466</div></div>
  </div>
</body></html>
