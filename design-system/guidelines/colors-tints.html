<!-- @dsCard group="Colors" viewport="700x150" name="Diagram tints" subtitle="Soft pastels for the radial Why-LFA wheels" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--lfa-white);padding:18px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1 1 0;min-width:120px}
  .chip{height:74px;border-radius:var(--radius-sm);border:1px solid var(--lfa-line);box-shadow:var(--shadow-xs)}
  .name{font-size:12px;font-weight:700;color:var(--lfa-navy);margin-top:8px}
  .hex{font-size:11px;color:var(--lfa-grey)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lfa-tint-rose)"></div><div class="name">Tint Rose</div><div class="hex">#DDA9B2</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-tint-blue)"></div><div class="name">Tint Blue</div><div class="hex">#D0E4ED</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-tint-sage)"></div><div class="name">Tint Sage</div><div class="hex">#BCD3D2</div></div>
    <div class="sw"><div class="chip" style="background:var(--lfa-tint-steel)"></div><div class="name">Tint Steel</div><div class="hex">#60729B</div></div>
  </div>
</body></html>
