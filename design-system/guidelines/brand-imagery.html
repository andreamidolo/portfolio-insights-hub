<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--lfa-white);padding:18px;display:flex;gap:14px}
  figure{margin:0;flex:1;display:flex;flex-direction:column;gap:6px}
  .img{height:120px;border-radius:var(--radius-sm);background-size:cover;background-position:center;border:1px solid var(--lfa-line)}
  .flag{height:120px;background-size:contain;background-repeat:no-repeat;background-position:center}
  figcaption{font-family:var(--font-sans);font-size:10.5px;color:var(--lfa-grey);text-align:center}
</style></head>
<body>
  <figure><div class="img" style="background-image:url(../assets/img-hero-zurich.png)"></div><figcaption>Golden-hour Zürich</figcaption></figure>
  <figure><div class="img" style="background-image:url(../assets/img-swiss-alps-lake.png)"></div><figcaption>Alps & lakes</figcaption></figure>
  <figure><div class="img" style="background-image:url(../assets/img-bellinzona-castle.png)"></div><figcaption>Bellinzona</figcaption></figure>
  <figure><div class="flag" style="background-image:url(../assets/illustration-swiss-flag.png)"></div><figcaption>Hand-drawn flag</figcaption></figure>
</body></html>
